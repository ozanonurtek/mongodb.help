# mongodb.help, Docker Swarm Production Stack
# Deploy:
#   source deploy/swarm/.env && \
#   IMAGE_TAG=latest docker stack deploy -c deploy/swarm/docker-compose.swarm.yml mongodbhelp
#
# Single-build / multi-deploy: every service image is pulled from GHCR.
# Per-region runtime config (domains, secrets, OAuth) comes from .env.* on
# the server, the image itself is region-agnostic.

x-defaults: &defaults
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback

services:
  # ────────────────────────────────────────
  # Nginx, Reverse Proxy + TLS termination (CF Origin / Let's Encrypt certs)
  # ────────────────────────────────────────
  nginx:
    image: nginx:1.30.4-alpine
    ports:
      - "443:443"
      - "80:80"   # HTTP→HTTPS redirect (defense-in-depth)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/keys/cert.pem:/opt/keys/cert.pem:ro
      - /opt/keys/privkey.pem:/opt/keys/privkey.pem:ro
    deploy:
      <<: *defaults
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "pgrep", "nginx"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────
  # MongoDB
  # ────────────────────────────────────────
  mongo:
    image: mongo:8.3.2-noble
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_password
      MONGO_INITDB_DATABASE: mongodbhelp
    secrets:
      - mongo_password
    deploy:
      <<: *defaults
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────
  # Backend (FastAPI), chat pipeline + /api/admin/*
  # ────────────────────────────────────────
  backend:
    image: ghcr.io/ozanonurtek/mongodb-help-backend:${IMAGE_TAG:-latest}
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS}
      DAILY_FREE_GRANT: ${DAILY_FREE_GRANT:-5}
      ANON_DAILY_CHATS: ${ANON_DAILY_CHATS:-1}
      ANON_MESSAGES_PER_CHAT: ${ANON_MESSAGES_PER_CHAT:-5}
      SIGNEDUP_DAILY_CHATS: ${SIGNEDUP_DAILY_CHATS:-10}
      SIGNEDUP_MESSAGES_PER_CHAT: ${SIGNEDUP_MESSAGES_PER_CHAT:-50}
      MONGODB_URI: ${MONGODB_URI}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
      # MongoDB Knowledge Service (optional overrides; grounded answers).
      KS_BASE_URL: ${KS_BASE_URL:-https://knowledge.mongodb.com/api/v1}
      KS_ORIGIN: ${KS_ORIGIN:-https://www.mongodb.com}
      KS_REQUEST_ORIGIN: ${KS_REQUEST_ORIGIN:-https://www.mongodb.com/docs/}]
      # HMAC secret shared with the backend (see backend service above).
      # The gateway signs each X-Auth-User-Id assertion with this; the
      # backend verifies. MUST match the backend value exactly.
      GATEWAY_HMAC_SECRET: "${GATEWAY_HMAC_SECRET:-dev-insecure-gateway-secret-change-me}"
    deploy:
      <<: *defaults
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────
  # Frontend (Next.js), chat UI, auth gateway, i18n
  # ────────────────────────────────────────
  frontend:
    image: ghcr.io/ozanonurtek/mongodb-help-frontend:${IMAGE_TAG:-latest}
    environment:
      BACKEND_URL: http://backend:8888
      AUTH_TRUST_HOST: "1"
      AUTH_URL: ${AUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      MONGODB_URI: ${MONGODB_URI}
      # Hours during which a deleted user cannot re-create an account
      # (cool-off gate, checked against *_to_be_terminated mirrors on sign-in).
      DELETE_COOL_OFF_HOURS: "${DELETE_COOL_OFF_HOURS:-24}"
      # HMAC secret shared with the backend (see backend service above).
      # The gateway signs each X-Auth-User-Id assertion with this; the
      # backend verifies. MUST match the backend value exactly.
      GATEWAY_HMAC_SECRET: "${GATEWAY_HMAC_SECRET:-dev-insecure-gateway-secret-change-me}"
    deploy:
      <<: *defaults
      replicas: 2

  # ────────────────────────────────────────
  # Leads Dashboard (Next.js), admin view at leads.mongodb.help
  # ────────────────────────────────────────
  leads-dashboard:
    image: ghcr.io/ozanonurtek/mongodb-help-leads-dashboard:${IMAGE_TAG:-latest}
    environment:
      BACKEND_URL: http://backend:8888
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
    deploy:
      <<: *defaults
      replicas: 1

secrets:
  mongo_password:
    external: true

volumes:
  mongo-data:
