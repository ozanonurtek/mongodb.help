user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker DNS resolver (Swarm service DNS).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ───────────────────────────────────────────────────────
    # Real client IP extraction.
    #
    # Docker Swarm's ingress mesh rewrites the TCP source address to an
    # internal VIP, so $remote_addr is the same private IP for every visitor.
    # Cloudflare sets CF-Connecting-IP to the true client address (and strips
    # any client-supplied value), so we trust it from internal networks only.
    # After this, $remote_addr / $X-Real-IP / XFF all hold the real client IP.
    # ───────────────────────────────────────────────────────
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 5m;

    # ───────────────────────────────────────────────────────
    # HTTP → HTTPS redirect (defense-in-depth; CF already does it).
    # ───────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ───────────────────────────────────────────────────────
    # Main app (mongodb.help), chat UI + /api gateway via frontend.
    # ───────────────────────────────────────────────────────
    upstream frontend {
        least_conn;
        server frontend:3333 max_fails=3 fail_timeout=15s;
    }

    upstream backend {
        least_conn;
        server backend:8888 max_fails=3 fail_timeout=15s;
    }

    upstream leads_dashboard {
        least_conn;
        server leads-dashboard:3434 max_fails=3 fail_timeout=15s;
    }

    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name mongodb.help www.mongodb.help;

        ssl_certificate     /opt/keys/cert.pem;
        ssl_certificate_key /opt/keys/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Everything (incl. /api/) goes to the frontend, which runs the auth
        # gateway route handler. The gateway authenticates via Auth.js, then
        # forwards /api/* to the backend with X-Auth-User-Id AND an HMAC
        # signature (X-Gateway-Sig) computed with GATEWAY_HMAC_SECRET. The
        # backend trusts the user id only when the signature verifies.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            # Streaming-safe: disable buffering for SSE/chunked chat responses.
            proxy_buffering off;
        }
    }

    # ───────────────────────────────────────────────────────
    # Leads admin dashboard (leads.mongodb.help).
    # Single-password auth handled inside the leads-dashboard app
    # (cookie + JWT), which then forwards to /api/admin/* with X-Admin-Token.
    # ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name leads.mongodb.help;

        ssl_certificate     /opt/keys/cert.pem;
        ssl_certificate_key /opt/keys/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://leads_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }
    }
}
