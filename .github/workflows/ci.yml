# CI — runs on every push to main and every pull request.
#
# This workflow is intentionally lightweight: type-check the TypeScript apps
# and sanity-check the Python backend (compile + import). Docker image builds
# are covered by build.yml.
#
# Keep `main` green. PRs cannot be merged while CI is red (see branch
# protection settings documented in CONTRIBUTING.md).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR/branch to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript type-checks (frontend + leads-dashboard) ──────────────────
  typecheck:
    name: Type-check (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: frontend
            dir: frontend
          - app: leads-dashboard
            dir: leads-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm ci

      - name: Type-check (tsc --noEmit)
        working-directory: ${{ matrix.dir }}
        run: npm run lint

  # ── Python sanity-check (backend) ───────────────────────────────────────
  python-check:
    name: Python check (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Compile all modules (catches syntax + import-shape errors)
        working-directory: backend
        run: python -m compileall -q app

      # Ruff runs with its default rule set (E/F/W). If a PR adds legitimate
      # exceptions, configure per-file-ignores in a pyproject.toml rather than
      # silencing the whole check. Tighten over time, don't loosen.
      - name: Ruff lint
        working-directory: backend
        run: ruff check app

  # ── Required check gate ─────────────────────────────────────────────────
  # A trivial job that depends on all others. Add this name ("CI passing") to
  # branch protection as the required status check so one toggle covers every
  # job above.
  ci-pass:
    name: CI passing
    runs-on: ubuntu-latest
    needs: [typecheck, python-check]
    if: always()
    steps:
      - name: Fail if any required job failed
        if: >
          needs.typecheck.result != 'success' ||
          needs.python-check.result != 'success'
        run: exit 1
      - name: All CI jobs passed
        run: echo "ok"
