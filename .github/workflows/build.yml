name: Build

# Build all app service images ONCE and push to GHCR with two tags:
#   - :<commit-sha>  (immutable, use this for deterministic deploys)
#   - :latest        (convenience shortcut for "deploy the newest build")
# nginx is NOT built, the stock `nginx:1.27-alpine` image is used and the
# config is mounted from deploy/swarm/nginx/nginx.conf at runtime.
#
# Deploy is a SEPARATE workflow so you can build, then deploy whenever.

on:
  workflow_dispatch:
    inputs:
      also_deploy:
        description: "Also run the Deploy workflow after building"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          # sha_arg: the Dockerfile ARG name each service reads. Frontend
          # apps need the NEXT_PUBLIC_ prefix so Next.js inlines the value
          # into the client bundle at build time (runtime env vars are NOT
          # visible client-side); the backend just needs the plain name.
          - { name: backend,          context: ./backend,         sha_arg: GIT_COMMIT_SHA }
          - { name: frontend,         context: ./frontend,        sha_arg: NEXT_PUBLIC_GIT_COMMIT_SHA }
          - { name: leads-dashboard,  context: ./leads-dashboard, sha_arg: NEXT_PUBLIC_GIT_COMMIT_SHA }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ozanonurtek/mongodb-help-${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/ozanonurtek/mongodb-help-${{ matrix.service.name }}:latest
          # Bake the commit SHA into the image so each deployed build can link
          # back to the exact source it was built from (sidebar footer + the
          # backend /api/health).
          build-args: |
            ${{ matrix.service.sha_arg }}=${{ github.sha }}

  # Optional one-shot: build then immediately deploy.
  deploy:
    needs: build
    if: ${{ inputs.also_deploy != '' }}
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ github.sha }}
    secrets: inherit
